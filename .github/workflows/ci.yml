name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv + Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync (locked, dev group)
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # Unit tests only; `network` (HF Hub) and `live` (paid API) are excluded to
      # keep CI hermetic and free — run them via make test-all / make test-live
      # per DEVELOPMENT.md. Mirrors `make test`.
      - name: Pytest
        run: uv run pytest -m "not network and not live"

  docs:
    name: docs consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync (locked, dev group)
        run: uv sync --locked

      # Offline doc/version/config-example consistency (make docs-check). A full
      # end-to-end CLI smoke on mockllm is intentionally NOT here yet: until
      # `local-adapter` (shipped 0.3) there was no network-free dataset source to
      # run one against. That source now exists, so a hermetic smoke is finally
      # possible; building it is the deferred follow-on tracked in
      # docs/plans/dev-framework.md (W2).
      - name: Docs consistency
        run: make docs-check
