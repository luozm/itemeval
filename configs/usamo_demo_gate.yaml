study: usamo_demo_gate
output_dir: ../studies
prompts_dir: ../prompts
rubrics_dir: ../rubrics
benchmark:
  adapter: hf
  datasets:
    - id: MathArena/usamo_2025
      revision: 0a2c60f2249e07b8ee76c942bca4f5f87aa959df
      split: train
  mapping:
    id: problem_idx
    input: problem
    target: sample_solution
    grading_scheme: grading_scheme
    metadata: [points]
solvers:
  models: [mockllm/solver-a, mockllm/solver-b, mockllm/solver-c]
  temperature: 0.7
  max_tokens: 1024
facets:
  prompt: [minimal, standard]
  grader: [mock_judge]
  rubric: [standard]
  replications: 2
graders:
  mock_judge:
    model: mockllm/judge
    max_tokens: 512
crossing: full
budget:
  policy: dev
  confirm_above_usd: 0.0       # M5 gate demo: every run requires confirmation
  batch: auto
